name: CI / CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: skynode-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skynode_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/skynode_test

      - name: Build application
        run: npm run build

  deploy-preview:
    name: Deploy Preview
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: vercel-preview
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Validate preview environment
        run: |
          env_file=".vercel/.env.preview.local"
          required_vars=(
            "VITE_SUPABASE_URL"
            "VITE_SUPABASE_ANON_KEY"
            "VITE_SUPABASE_AVATAR_BUCKET"
            "DATABASE_URL"
            "SUPABASE_SECRET_KEY"
            "GEMINI_API_KEY"
            "GEOAPIFY_API_KEY"
            "OPENROUTESERVICE_API_KEY"
          )

          if [ ! -f "$env_file" ]; then
            echo "Missing Vercel preview environment file: $env_file"
            exit 1
          fi

          missing=()
          for var_name in "${required_vars[@]}"; do
            if ! grep -Eq "^${var_name}=.+" "$env_file"; then
              missing+=("$var_name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required preview environment variables:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "Preview environment validation passed."

      - name: Export preview Vite environment
        run: |
          cp .vercel/.env.preview.local .env.production.local
          node <<'NODE'
          const fs = require("fs");
          const envFile = ".vercel/.env.preview.local";
          const required = ["VITE_SUPABASE_URL", "VITE_SUPABASE_ANON_KEY", "VITE_SUPABASE_AVATAR_BUCKET"];
          const content = fs.readFileSync(envFile, "utf8");
          const values = new Map();

          for (const rawLine of content.split(/\r?\n/)) {
            const line = rawLine.trim();
            if (!line || line.startsWith("#")) continue;

            const index = line.indexOf("=");
            if (index === -1) continue;

            const key = line.slice(0, index).trim();
            let value = line.slice(index + 1).trim();

            if ((value.startsWith("\"") && value.endsWith("\"")) || (value.startsWith("'") && value.endsWith("'"))) {
              value = value.slice(1, -1);
            }

            values.set(key, value);
          }

          const missing = required.filter((key) => !values.get(key));
          if (missing.length) {
            console.error("Missing Vite build variables:", missing.join(", "));
            process.exit(1);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, required.map((key) => key + "=" + values.get(key)).join("\n") + "\n");
          console.log("Preview Vite build variables exported.");
          NODE

      - name: Build Vercel artifacts
        run: |
          node -e "const required = ['VITE_SUPABASE_URL', 'VITE_SUPABASE_ANON_KEY', 'VITE_SUPABASE_AVATAR_BUCKET']; const missing = required.filter((key) => !process.env[key]); if (missing.length) { console.error('Missing Vite build variables:', missing.join(', ')); process.exit(1); } console.log('Vite build variables are present.');"
          vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview deployment: $url"

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Validate production environment
        run: |
          env_file=".vercel/.env.production.local"
          required_vars=(
            "VITE_SUPABASE_URL"
            "VITE_SUPABASE_ANON_KEY"
            "VITE_SUPABASE_AVATAR_BUCKET"
            "DATABASE_URL"
            "SUPABASE_SECRET_KEY"
            "GEMINI_API_KEY"
            "GEOAPIFY_API_KEY"
            "OPENROUTESERVICE_API_KEY"
          )

          if [ ! -f "$env_file" ]; then
            echo "Missing Vercel production environment file: $env_file"
            exit 1
          fi

          missing=()
          for var_name in "${required_vars[@]}"; do
            if ! grep -Eq "^${var_name}=.+" "$env_file"; then
              missing+=("$var_name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required production environment variables:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "Production environment validation passed."

      - name: Export production Vite environment
        run: |
          cp .vercel/.env.production.local .env.production.local
          node <<'NODE'
          const fs = require("fs");
          const envFile = ".vercel/.env.production.local";
          const required = ["VITE_SUPABASE_URL", "VITE_SUPABASE_ANON_KEY", "VITE_SUPABASE_AVATAR_BUCKET"];
          const content = fs.readFileSync(envFile, "utf8");
          const values = new Map();

          for (const rawLine of content.split(/\r?\n/)) {
            const line = rawLine.trim();
            if (!line || line.startsWith("#")) continue;

            const index = line.indexOf("=");
            if (index === -1) continue;

            const key = line.slice(0, index).trim();
            let value = line.slice(index + 1).trim();

            if ((value.startsWith("\"") && value.endsWith("\"")) || (value.startsWith("'") && value.endsWith("'"))) {
              value = value.slice(1, -1);
            }

            values.set(key, value);
          }

          const missing = required.filter((key) => !values.get(key));
          if (missing.length) {
            console.error("Missing Vite build variables:", missing.join(", "));
            process.exit(1);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, required.map((key) => key + "=" + values.get(key)).join("\n") + "\n");
          console.log("Production Vite build variables exported.");
          NODE

      - name: Build Vercel artifacts
        run: |
          node -e "const required = ['VITE_SUPABASE_URL', 'VITE_SUPABASE_ANON_KEY', 'VITE_SUPABASE_AVATAR_BUCKET']; const missing = required.filter((key) => !process.env[key]); if (missing.length) { console.error('Missing Vite build variables:', missing.join(', ')); process.exit(1); } console.log('Vite build variables are present.');"
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Production deployment: $url"
